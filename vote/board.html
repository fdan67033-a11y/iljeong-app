<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>청렴 슬로건 공모 현황</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #12141c; color: #f2f3f8; min-height: 100vh;
  }
  .wrap {
    display: flex; gap: 40px; max-width: 1320px; margin: 0 auto;
    padding: 44px 32px 20px; flex-wrap: wrap; align-items: flex-start;
  }
  .qrcard {
    background: #fff; color: #1f2330; border-radius: 22px;
    padding: 24px 24px 18px; text-align: center; width: 260px; flex-shrink: 0;
  }
  .qrcard h2 { font-size: 16px; margin-bottom: 14px; line-height: 1.45; }
  #qr { display: flex; justify-content: center; }
  #qr img, #qr canvas { border-radius: 6px; }
  .qrcard .url {
    margin-top: 12px; font-size: 11px; color: #8a90a3; word-break: break-all;
    font-family: Consolas, monospace;
  }
  .chart { flex: 1; min-width: 420px; }
  .top { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
  h1 { font-size: 40px; line-height: 1.25; }
  .phasePill {
    font-size: 15px; font-weight: 700; border-radius: 999px; padding: 6px 16px;
    background: rgba(255, 255, 255, .1); color: #c6cad9;
  }
  .phasePill.live { background: #14532d; color: #86efac; }
  #part { font-size: 20px; color: #9aa0b4; }
  #part b { color: #f2f3f8; font-size: 26px; }
  #status { font-size: 14px; color: #9aa0b4; margin-top: 10px; display: flex; align-items: center; gap: 7px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #f0b429; flex-shrink: 0; }
  .dot.on { background: #22c55e; }
  #content { margin-top: 26px; }

  /* 접수 단계: 갤러리 */
  .ggrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .gcard {
    background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .1);
    border-radius: 16px; padding: 18px 20px;
  }
  .gcard .txt { font-size: 19px; line-height: 1.55; font-weight: 600; }
  .gcard .meta { margin-top: 10px; }
  .chip { font-size: 12px; font-weight: 700; border-radius: 999px; padding: 3px 11px; color: #fff; }

  /* 투표/마감 단계: 순위 */
  .rrow {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255, 255, 255, .04); border: 1px solid rgba(255, 255, 255, .08);
    border-radius: 14px; padding: 12px 16px; margin-bottom: 10px;
    transition: background .5s;
  }
  .rrow.flash { background: rgba(255, 255, 255, .12); transition: none; }
  .rrow.winner { border-color: #eab308; background: rgba(234, 179, 8, .08); }
  .rank { font-size: 20px; font-weight: 700; color: #9aa0b4; width: 34px; text-align: center; flex-shrink: 0; }
  .rrow.winner .rank { color: #facc15; }
  .rbody { flex: 1; min-width: 0; }
  .rtxt { font-size: 19px; font-weight: 600; line-height: 1.4; }
  .rmeta { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .rtrack { flex: 1; background: rgba(255, 255, 255, .07); border-radius: 8px; height: 12px; overflow: hidden; }
  .rfill { height: 100%; border-radius: 8px; width: 0%; transition: width .6s cubic-bezier(.22, 1, .36, 1); }
  .rcnt { font-size: 17px; color: #c6cad9; font-variant-numeric: tabular-nums; width: 52px; text-align: right; flex-shrink: 0; }
  #waiting { max-width: 1320px; margin: 0 auto; padding: 10px 32px 30px; font-size: 14px; color: #6f7488; }
  .empty { color: #6f7488; font-size: 16px; padding: 20px 4px; }
  @media (max-width: 760px) {
    .wrap { flex-direction: column; align-items: center; padding: 24px 18px 12px; gap: 22px; }
    .chart { min-width: 0; width: 100%; }
    h1 { font-size: 26px; }
    .rtxt { font-size: 16px; }
    .gcard .txt { font-size: 16px; }
    .qrcard { width: 220px; padding: 18px 18px 14px; }
    .qrcard h2 { font-size: 14px; }
    #waiting { padding-left: 18px; padding-right: 18px; }
  }
  [hidden] { display: none; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="qrcard">
      <h2>📱 이 현황판, 폰으로도<br>실시간으로 볼 수 있어요</h2>
      <div id="qr"></div>
      <div class="url" id="boardUrl"></div>
    </div>
    <div class="chart">
      <div class="top">
        <h1 id="q"></h1>
        <span class="phasePill" id="phasePill">불러오는 중</span>
        <span id="part" hidden>제출 <b>0</b><span id="partTotal"></span></span>
      </div>
      <div id="status"><span class="dot" id="dot"></span><span id="statusText">연결 중…</span></div>
      <div id="content">
        <div id="gallery" hidden></div>
        <div id="ranking" hidden></div>
      </div>
    </div>
  </div>
  <div id="waiting"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="config.js"></script>
<script>
  var COLORS = ["#6366f1", "#f59e0b", "#10b981", "#ec4899", "#38bdf8", "#f97316"];

  document.getElementById("q").textContent = POLL.title;
  document.getElementById("partTotal").textContent = " / " + POLL.voters.length + "명";

  var teamByKey = {};
  var teamColor = {};
  POLL.teams.forEach(function (t, i) {
    teamByKey[t.key] = t;
    teamColor[t.key] = COLORS[i % COLORS.length];
  });

  var boardUrl = location.href.split("?")[0].split("#")[0];
  new QRCode(document.getElementById("qr"), {
    text: boardUrl, width: 172, height: 172,
    correctLevel: QRCode.CorrectLevel.M,
  });
  document.getElementById("boardUrl").textContent = boardUrl;

  var phase = null;
  var slogans = {};    // sid -> {text, team, ts}
  var ballots = {};    // h -> [sid, sid] | null
  var prevCounts = {};
  var rowNodes = {};   // sid -> {row, rank, txt, chip, fill, cnt}

  var galleryEl = document.getElementById("gallery");
  var rankingEl = document.getElementById("ranking");

  function setStatus(text, on) {
    document.getElementById("statusText").textContent = text;
    document.getElementById("dot").className = on ? "dot on" : "dot";
  }

  function teamLabel(teamKey) {
    var team = teamByKey[teamKey];
    return team ? team.emoji + " " + team.name : teamKey;
  }

  // ----- 접수 단계: 갤러리 (제출이 잦지 않아 통째로 다시 그려도 무방) -----
  function renderGallery() {
    galleryEl.innerHTML = "";
    var ids = Object.keys(slogans).sort(function (a, b) {
      return (slogans[b].ts || 0) - (slogans[a].ts || 0);
    });
    if (ids.length === 0) {
      var empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "아직 제출된 문구가 없습니다 — 첫 번째 주인공이 되어보세요!";
      galleryEl.appendChild(empty);
      return;
    }
    var grid = document.createElement("div");
    grid.className = "ggrid";
    ids.forEach(function (sid) {
      var card = document.createElement("div");
      card.className = "gcard";
      var txt = document.createElement("div");
      txt.className = "txt";
      txt.textContent = "“" + slogans[sid].text + "”";
      var meta = document.createElement("div");
      meta.className = "meta";
      var chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = teamLabel(slogans[sid].team);
      chip.style.background = teamColor[slogans[sid].team] || "#8a90a3";
      meta.appendChild(chip);
      card.appendChild(txt);
      card.appendChild(meta);
      grid.appendChild(card);
    });
    galleryEl.appendChild(grid);
  }

  // ----- 투표/마감: 순위 (막대가 이전 값에서 부드럽게 이동하도록 행을 유지·갱신) -----
  function createRow() {
    var row = document.createElement("div");
    row.className = "rrow";
    var rank = document.createElement("div");
    rank.className = "rank";
    var body = document.createElement("div");
    body.className = "rbody";
    var txt = document.createElement("div");
    txt.className = "rtxt";
    var meta = document.createElement("div");
    meta.className = "rmeta";
    var chip = document.createElement("span");
    chip.className = "chip";
    var track = document.createElement("div");
    track.className = "rtrack";
    var fill = document.createElement("div");
    fill.className = "rfill";
    track.appendChild(fill);
    meta.appendChild(chip);
    meta.appendChild(track);
    body.appendChild(txt);
    body.appendChild(meta);
    var cnt = document.createElement("div");
    cnt.className = "rcnt";
    row.appendChild(rank);
    row.appendChild(body);
    row.appendChild(cnt);
    return { row: row, rank: rank, txt: txt, chip: chip, fill: fill, cnt: cnt };
  }

  function renderRanking() {
    var ids = Object.keys(slogans);
    var counts = {};
    ids.forEach(function (sid) { counts[sid] = 0; });
    var submittedCnt = 0;
    POLL.voters.forEach(function (v) {
      var b = ballots[v.h];
      if (!b) return;
      submittedCnt++;
      b.forEach(function (sid) { if (counts[sid] !== undefined) counts[sid]++; });
    });
    document.querySelector("#part b").textContent = submittedCnt;

    ids.sort(function (a, b) {
      return (counts[b] - counts[a]) || ((slogans[a].ts || 0) - (slogans[b].ts || 0));
    });
    var maxCnt = 0;
    ids.forEach(function (sid) { if (counts[sid] > maxCnt) maxCnt = counts[sid]; });

    // 사라진 문구 행 제거
    Object.keys(rowNodes).forEach(function (sid) {
      if (!slogans[sid]) {
        if (rowNodes[sid].row.parentNode) rowNodes[sid].row.parentNode.removeChild(rowNodes[sid].row);
        delete rowNodes[sid];
        delete prevCounts[sid];
      }
    });

    // 행 생성·갱신 (제자리 업데이트 → 막대 애니메이션 유지)
    ids.forEach(function (sid, i) {
      var n = rowNodes[sid];
      if (!n) { n = createRow(); rowNodes[sid] = n; }
      var isWinner = (phase === "closed" && maxCnt > 0 && counts[sid] === maxCnt);
      n.row.className = "rrow" + (isWinner ? " winner" : "");
      n.rank.textContent = isWinner ? "👑" : (i + 1);
      n.txt.textContent = "“" + slogans[sid].text + "”";
      n.chip.textContent = teamLabel(slogans[sid].team);
      n.chip.style.background = teamColor[slogans[sid].team] || "#8a90a3";
      n.cnt.textContent = counts[sid] + "표";
      n.fill.style.background = teamColor[slogans[sid].team] || "#8a90a3";
      n.fill.style.width = (maxCnt ? (counts[sid] / maxCnt) * 100 : 0) + "%";
      if (prevCounts[sid] !== undefined && prevCounts[sid] !== counts[sid]) {
        n.row.classList.add("flash");
        (function (row) { setTimeout(function () { row.classList.remove("flash"); }, 80); })(n.row);
      }
      prevCounts[sid] = counts[sid];
    });

    // 정렬 순서대로 DOM 재배치 (노드를 옮기는 것이라 진행 중인 전환은 유지됨)
    ids.forEach(function (sid) { rankingEl.appendChild(rowNodes[sid].row); });

    var waiting = document.getElementById("waiting");
    if (phase === "vote") {
      var missing = POLL.voters.filter(function (v) { return !ballots[v.h]; });
      if (missing.length === 0) waiting.textContent = "🎉 전원 제출 완료!";
      else if (missing.length < POLL.voters.length)
        waiting.textContent = "미제출: " + missing.map(function (v) { return v.name; }).join(", ");
      else waiting.textContent = "";
    } else {
      waiting.textContent = "";
    }
  }

  function render() {
    var pill = document.getElementById("phasePill");
    var part = document.getElementById("part");
    var waiting = document.getElementById("waiting");

    if (!phase) {
      pill.textContent = "불러오는 중"; pill.className = "phasePill";
      part.hidden = true; galleryEl.hidden = true; rankingEl.hidden = true;
      waiting.textContent = "";
      return;
    }

    if (phase === "collect") {
      pill.textContent = "📝 슬로건 접수 중"; pill.className = "phasePill live";
      part.hidden = true; rankingEl.hidden = true; galleryEl.hidden = false;
      renderGallery();
      var perTeam = {};
      POLL.teams.forEach(function (t) { perTeam[t.key] = 0; });
      Object.keys(slogans).forEach(function (sid) {
        var k = slogans[sid].team;
        if (perTeam[k] !== undefined) perTeam[k]++;
      });
      waiting.textContent = "팀별 접수: " + POLL.teams.map(function (t) {
        return t.name + " " + perTeam[t.key] + "건";
      }).join(" · ");
      return;
    }

    // vote / closed
    pill.textContent = phase === "vote" ? "🗳️ 투표 진행 중" : "🏁 투표 마감 — 최종 결과";
    pill.className = phase === "vote" ? "phasePill live" : "phasePill";
    part.hidden = false; galleryEl.hidden = true; rankingEl.hidden = false;
    renderRanking();
  }
  render();

  // ----- Firebase 실시간 구독 -----
  firebase.initializeApp(POLL.firebase);
  var db = firebase.database();
  var base = "polls/" + POLL.id;

  db.ref(".info/connected").on("value", function (snap) {
    if (snap.val() === true) setStatus("실시간 연결됨", true);
    else setStatus("연결 중…", false);
  });

  db.ref(base + "/state/phase").on("value", function (snap) {
    phase = snap.val();
    render();
  }, function () {
    setStatus("읽기 권한 오류 — 보안 규칙이 게시됐는지 확인하세요", false);
  });

  db.ref(base + "/sloganList").on("value", function (snap) {
    slogans = snap.val() || {};
    render();
  }, function () {
    setStatus("읽기 권한 오류 — 보안 규칙이 게시됐는지 확인하세요", false);
  });

  POLL.voters.forEach(function (v) {
    db.ref(base + "/ballots/" + v.h + "/vote").on("value", function (snap) {
      var val = snap.val();
      if (val && val.picks && typeof val.picks.a === "string") {
        ballots[v.h] = [val.picks.a, val.picks.b];
      } else {
        ballots[v.h] = null;
      }
      render();
    }, function () {
      setStatus("읽기 권한 오류 — 보안 규칙이 게시됐는지 확인하세요", false);
    });
  });
</script>
</body>
</html>
