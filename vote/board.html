<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>실시간 투표 결과</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #12141c; color: #f2f3f8; min-height: 100vh;
  }
  .wrap {
    display: flex; gap: 40px; max-width: 1320px; margin: 0 auto;
    padding: 44px 32px; flex-wrap: wrap; align-items: flex-start;
  }
  .qrcard {
    background: #fff; color: #1f2330; border-radius: 22px;
    padding: 28px 28px 22px; text-align: center; width: 320px; flex-shrink: 0;
  }
  .qrcard h2 { font-size: 19px; margin-bottom: 16px; line-height: 1.45; }
  #qr { display: flex; justify-content: center; }
  #qr img, #qr canvas { border-radius: 6px; }
  .qrcard .url {
    margin-top: 14px; font-size: 12px; color: #8a90a3; word-break: break-all;
    font-family: Consolas, monospace;
  }
  .chart { flex: 1; min-width: 420px; }
  .top { display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap; }
  h1 { font-size: 44px; line-height: 1.25; }
  #total { font-size: 22px; color: #9aa0b4; }
  #total b { color: #f2f3f8; font-size: 30px; }
  #status { font-size: 14px; color: #9aa0b4; margin-top: 10px; display: flex; align-items: center; gap: 7px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #f0b429; flex-shrink: 0; }
  .dot.on { background: #22c55e; }
  #rows { margin-top: 30px; }
  .row { margin-bottom: 24px; border-radius: 14px; padding: 10px 14px; transition: background .5s; }
  .row.flash { background: rgba(255, 255, 255, .10); transition: none; }
  .label { font-size: 27px; display: flex; justify-content: space-between; align-items: baseline; }
  .label .cnt { font-size: 23px; color: #c6cad9; font-variant-numeric: tabular-nums; }
  .track {
    background: rgba(255, 255, 255, .07); border-radius: 12px; height: 46px;
    overflow: hidden; margin-top: 10px;
  }
  .fill {
    height: 100%; border-radius: 12px; width: 0%;
    transition: width .6s cubic-bezier(.22, 1, .36, 1);
  }
  .foot { max-width: 1320px; margin: 0 auto; padding: 0 32px 30px; display: flex; justify-content: flex-end; }
  #reset {
    background: none; border: 1px solid #33374a; color: #6f7488; border-radius: 9px;
    padding: 7px 14px; font-size: 12px; cursor: pointer; font-family: inherit;
  }
  #reset:hover { color: #c6cad9; border-color: #6f7488; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="qrcard">
      <h2>📱 스마트폰 카메라로<br>QR을 찍어 투표하세요</h2>
      <div id="qr"></div>
      <div class="url" id="voteUrl"></div>
    </div>
    <div class="chart">
      <div class="top">
        <h1 id="q"></h1>
        <span id="total">총 <b>0</b>표</span>
      </div>
      <div id="status"><span class="dot" id="dot"></span><span id="statusText">연결 중…</span></div>
      <div id="rows"></div>
    </div>
  </div>
  <div class="foot"><button id="reset">집계 초기화</button></div>

<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="config.js"></script>
<script>
  var TOPIC = POLL.id + "/vote";
  var storeKey = "qrvote-counts-" + POLL.id;
  var COLORS = ["#6366f1", "#f59e0b", "#10b981", "#ec4899", "#38bdf8", "#f97316"];

  document.getElementById("q").textContent = POLL.question;

  // ----- QR: 이 페이지 주소에서 board.html만 뗀 폴더 주소가 투표 페이지 -----
  var voteUrl = new URL(".", location.href).href;
  new QRCode(document.getElementById("qr"), {
    text: voteUrl, width: 224, height: 224,
    correctLevel: QRCode.CorrectLevel.M,
  });
  document.getElementById("voteUrl").textContent = voteUrl;

  // ----- 집계 상태 (새로고침해도 유지되도록 localStorage에 저장) -----
  var counts = {};
  try {
    var parsed = JSON.parse(localStorage.getItem(storeKey));
    if (parsed && typeof parsed === "object" && !Array.isArray(parsed)) counts = parsed;
  } catch (e) {}
  POLL.options.forEach(function (o) {
    if (typeof counts[o.key] !== "number") counts[o.key] = 0;
  });
  function save() { localStorage.setItem(storeKey, JSON.stringify(counts)); }

  // ----- 막대 그래프 -----
  var rowEls = {};
  var rows = document.getElementById("rows");
  POLL.options.forEach(function (o, i) {
    var div = document.createElement("div");
    div.className = "row";
    var label = document.createElement("div");
    label.className = "label";
    var name = document.createElement("span");
    name.textContent = o.emoji + " " + o.label;
    var cnt = document.createElement("span");
    cnt.className = "cnt";
    cnt.textContent = "0표 (0%)";
    label.appendChild(name);
    label.appendChild(cnt);
    var track = document.createElement("div");
    track.className = "track";
    var fill = document.createElement("div");
    fill.className = "fill";
    fill.style.background = COLORS[i % COLORS.length];
    track.appendChild(fill);
    div.appendChild(label);
    div.appendChild(track);
    rows.appendChild(div);
    rowEls[o.key] = div;
  });

  function render() {
    var total = 0;
    POLL.options.forEach(function (o) { total += counts[o.key]; });
    POLL.options.forEach(function (o) {
      var pct = total ? (counts[o.key] / total) * 100 : 0;
      var el = rowEls[o.key];
      el.querySelector(".fill").style.width = pct + "%";
      el.querySelector(".cnt").textContent = counts[o.key] + "표 (" + Math.round(pct) + "%)";
    });
    document.querySelector("#total b").textContent = total;
  }
  render();

  function flash(key) {
    var el = rowEls[key];
    if (!el) return;
    el.classList.add("flash");
    setTimeout(function () { el.classList.remove("flash"); }, 80);
  }

  // ----- 실시간 연결: 표 유실 방지를 위해 모든 브로커를 동시에 구독 -----
  //       (참가자 폰이 어느 브로커로 연결되든 여기서 다 받습니다)
  function setStatus(text, on) {
    document.getElementById("statusText").textContent = text;
    document.getElementById("dot").className = on ? "dot on" : "dot";
  }

  var seen = new Set();      // 투표 ID 중복 수신 방지 (QoS1 재전송 대비)
  function onMsg(t, payload) {
    try {
      var m = JSON.parse(payload.toString());
      if (!m || !Object.prototype.hasOwnProperty.call(counts, m.k)) return;
      if (m.id) {
        if (seen.has(m.id)) return;
        seen.add(m.id);
        if (seen.size > 2000) seen = new Set(Array.from(seen).slice(-1000));
      }
      counts[m.k]++;
      save();
      render();
      flash(m.k);
    } catch (e) { /* 잘못된 메시지는 무시 */ }
  }

  var links = [];
  function updateStatus() {
    var up = links.some(function (x) { return x.up; });
    if (up) setStatus("실시간 연결됨 — 투표를 기다리는 중", true);
    else setStatus("연결 중…", false);
  }
  POLL.brokers.forEach(function (url) {
    var entry = { up: false };
    links.push(entry);
    var c = mqtt.connect(url, {
      clientId: "qb_" + Math.random().toString(16).slice(2, 10),
      connectTimeout: 8000,
      reconnectPeriod: 5000,
      clean: true,
    });
    c.on("connect", function () {
      entry.up = true;
      c.subscribe(TOPIC, { qos: 1 });
      updateStatus();
    });
    c.on("close", function () {
      if (entry.up) { entry.up = false; updateStatus(); }
    });
    c.on("error", function () { /* 재연결은 mqtt.js가 알아서 반복 */ });
    c.on("message", onMsg);
  });

  // ----- 초기화 -----
  document.getElementById("reset").addEventListener("click", function () {
    if (!confirm("집계를 0으로 초기화할까요?")) return;
    POLL.options.forEach(function (o) { counts[o.key] = 0; });
    save();
    render();
  });
</script>
</body>
</html>
