<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>실시간 투표</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f4f5fa; color: #1f2330;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 28px 16px;
  }
  .badge {
    font-size: 13px; font-weight: 600; color: #4f46e5; background: #e8e7fd;
    border-radius: 999px; padding: 5px 14px;
  }
  h1 { font-size: 24px; margin: 16px 0 8px; text-align: center; line-height: 1.4; }
  #status { font-size: 13px; color: #8a90a3; margin-bottom: 22px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #f0b429; flex-shrink: 0; }
  .dot.on { background: #22c55e; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 420px; }
  .grid[hidden] { display: none; }
  button.opt {
    background: #fff; border: 2px solid #e4e6ef; border-radius: 18px;
    padding: 22px 10px 18px; cursor: pointer; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-family: inherit; transition: transform .08s, border-color .15s;
  }
  button.opt:active { transform: scale(.96); }
  button.opt:not(:disabled):hover { border-color: #4f46e5; }
  button.opt:disabled { opacity: .45; cursor: default; }
  button.opt .e { font-size: 44px; line-height: 1; }
  button.opt .l { font-size: 17px; font-weight: 600; }
  #done {
    background: #fff; border-radius: 20px; padding: 36px 28px; text-align: center;
    width: 100%; max-width: 420px; border: 2px solid #e4e6ef;
  }
  #done .big { font-size: 60px; margin-bottom: 12px; }
  #done p { font-size: 17px; margin: 4px 0; }
  #done .muted { font-size: 14px; color: #8a90a3; margin-top: 8px; }
  #again {
    margin-top: 22px; background: none; border: 1px solid #d4d7e3; border-radius: 10px;
    padding: 9px 16px; font-size: 13px; color: #8a90a3; cursor: pointer; font-family: inherit;
  }
  footer { margin-top: auto; padding-top: 30px; font-size: 12px; color: #b6bac9; }
</style>
</head>
<body>
  <div class="badge">📡 실시간 투표</div>
  <h1 id="q"></h1>
  <div id="status"><span class="dot" id="dot"></span><span id="statusText">연결 중…</span></div>

  <div class="grid" id="grid"></div>

  <div id="done" hidden>
    <div class="big" id="doneEmoji"></div>
    <p><b id="doneLabel"></b>에 투표했습니다!</p>
    <p class="muted">앞의 화면에서 그래프가 움직이는 걸 확인해 보세요 👀</p>
    <button id="again">한 번 더 투표하기 (테스트용)</button>
  </div>

  <footer>QR 실시간 투표 데모</footer>

<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<script src="config.js"></script>
<script>
  var TOPIC = POLL.id + "/vote";
  var votedKey = "qrvote-" + POLL.id;
  var client = null, ready = false;

  document.getElementById("q").textContent = POLL.question;

  var grid = document.getElementById("grid");
  var buttons = [];
  POLL.options.forEach(function (o) {
    var b = document.createElement("button");
    b.className = "opt";
    b.disabled = true;
    var e = document.createElement("span");
    e.className = "e";
    e.textContent = o.emoji;
    var l = document.createElement("span");
    l.className = "l";
    l.textContent = o.label;
    b.appendChild(e);
    b.appendChild(l);
    b.addEventListener("click", function () { vote(o); });
    grid.appendChild(b);
    buttons.push(b);
  });

  function setButtons(enabled) {
    buttons.forEach(function (b) { b.disabled = !enabled; });
  }
  function canVote() { return !localStorage.getItem(votedKey); }
  function setStatus(text, on) {
    document.getElementById("statusText").textContent = text;
    document.getElementById("dot").className = on ? "dot on" : "dot";
  }

  // ----- 연결: 브로커를 차례로 시도. 브라우저 mqtt.js는 실패 시 error 이벤트가
  //       안 올 수 있어서 타임아웃으로 다음 브로커로 넘어갑니다. -----
  function connect(idx) {
    if (idx >= POLL.brokers.length) {
      setStatus("연결 실패 — 5초 후 다시 시도합니다", false);
      setTimeout(function () { connect(0); }, 5000);
      return;
    }
    setStatus("연결 중…", false);
    var c = mqtt.connect(POLL.brokers[idx], {
      clientId: "qv_" + Math.random().toString(16).slice(2, 10),
      connectTimeout: 6000,
      reconnectPeriod: 4000,
      clean: true,
    });
    var moved = false, everConnected = false;
    function giveUp() {
      if (everConnected || moved) return;
      moved = true;
      try { c.end(true); } catch (e) {}
      connect(idx + 1);
    }
    var probe = setTimeout(giveUp, 8000);
    c.on("connect", function () {
      clearTimeout(probe);
      everConnected = true;
      client = c;
      ready = true;
      setStatus("실시간 연결됨", true);
      if (canVote()) setButtons(true);
    });
    c.on("offline", function () {
      ready = false;
      setStatus("재연결 중…", false);
      setButtons(false);
    });
    c.on("close", giveUp);
    c.on("error", giveUp);
  }
  connect(0);

  function vote(o) {
    if (!ready || !client) return;
    setButtons(false);
    setStatus("전송 중…", false);
    var settled = false;
    var timer = setTimeout(function () {
      if (settled) return;
      settled = true;
      setStatus("전송 실패 — 다시 눌러주세요", false);
      if (canVote() && ready) setButtons(true);
    }, 6000);
    var msg = JSON.stringify({
      k: o.key,
      id: "v" + Date.now().toString(36) + Math.random().toString(36).slice(2, 8),
    });
    client.publish(TOPIC, msg, { qos: 1 }, function (err) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      if (err) {
        setStatus("전송 실패 — 다시 눌러주세요", false);
        if (ready) setButtons(true);
        return;
      }
      localStorage.setItem(votedKey, o.key);
      setStatus("실시간 연결됨", true);
      showDone(o);
    });
  }

  function showDone(o) {
    grid.hidden = true;
    document.getElementById("done").hidden = false;
    document.getElementById("doneEmoji").textContent = o.emoji;
    document.getElementById("doneLabel").textContent = o.label;
  }

  // 이미 투표한 기기라면 완료 화면으로
  var prev = localStorage.getItem(votedKey);
  if (prev) {
    var po = null;
    POLL.options.forEach(function (o) { if (o.key === prev) po = o; });
    if (po) showDone(po);
  }

  document.getElementById("again").addEventListener("click", function () {
    localStorage.removeItem(votedKey);
    document.getElementById("done").hidden = true;
    grid.hidden = false;
    if (ready) setButtons(true);
  });
</script>
</body>
</html>
