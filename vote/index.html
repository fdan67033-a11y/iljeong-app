<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>팀 투표</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f4f5fa; color: #1f2330;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 24px 16px;
  }
  .badge {
    font-size: 13px; font-weight: 600; color: #4f46e5; background: #e8e7fd;
    border-radius: 999px; padding: 5px 14px;
  }
  h1 { font-size: 23px; margin: 14px 0 4px; text-align: center; line-height: 1.4; }
  .sub { font-size: 13px; color: #8a90a3; text-align: center; }
  .me { font-size: 14px; margin-top: 10px; color: #4f46e5; font-weight: 600; }
  #status { font-size: 13px; color: #8a90a3; margin: 8px 0 12px; display: flex; align-items: center; gap: 6px; }
  #status[hidden] { display: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #f0b429; flex-shrink: 0; }
  .dot.on { background: #22c55e; }
  #notice {
    background: #fdf3e2; border: 1px solid #f0d5a0; color: #7a5a12; border-radius: 12px;
    padding: 10px 14px; font-size: 13px; margin-bottom: 12px; max-width: 440px; width: 100%;
    text-align: center;
  }
  #list { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 440px; }
  #list[hidden] { display: none; }
  button.team {
    background: #fff; border: 2px solid #e4e6ef; border-radius: 16px;
    padding: 16px 18px; cursor: pointer; text-align: left;
    display: flex; align-items: center; gap: 14px;
    font-family: inherit; font-size: 18px; font-weight: 600; color: #1f2330;
    transition: border-color .15s, background .15s;
  }
  button.team .e { font-size: 30px; line-height: 1; }
  button.team .mark {
    margin-left: auto; width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid #d4d7e3; display: flex; align-items: center; justify-content: center;
    font-size: 15px; color: #fff; flex-shrink: 0;
  }
  button.team.sel { border-color: #4f46e5; background: #f4f3ff; }
  button.team.sel .mark { background: #4f46e5; border-color: #4f46e5; }
  button.team.mine { opacity: .5; cursor: not-allowed; }
  button.team.mine .tag { margin-left: auto; font-size: 12px; color: #d85a30; font-weight: 600; }
  button.team:disabled { cursor: not-allowed; }
  #submitWrap { width: 100%; max-width: 440px; margin-top: 16px; }
  #submitWrap[hidden] { display: none; }
  #picked { font-size: 13px; color: #8a90a3; text-align: center; margin-bottom: 10px; }
  #submit {
    width: 100%; background: #4f46e5; color: #fff; border: none; border-radius: 14px;
    padding: 16px; font-size: 17px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  #submit:disabled { background: #c7c5f4; cursor: default; }
  #done {
    background: #fff; border-radius: 20px; padding: 32px 26px; text-align: center;
    width: 100%; max-width: 440px; border: 2px solid #e4e6ef; margin-top: 4px;
  }
  #done .big { font-size: 52px; margin-bottom: 10px; }
  #done p { font-size: 16px; margin: 4px 0; }
  #done .picks { font-size: 18px; font-weight: 700; margin: 10px 0; line-height: 1.7; }
  #done .muted { font-size: 13px; color: #8a90a3; margin-top: 6px; }
  .doneBtns { display: flex; gap: 10px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
  .doneBtns a, .doneBtns button {
    border-radius: 10px; padding: 11px 18px; font-size: 14px; cursor: pointer;
    font-family: inherit; text-decoration: none;
  }
  #goBoard { background: #4f46e5; color: #fff; border: none; font-weight: 600; }
  #edit { background: none; border: 1px solid #d4d7e3; color: #8a90a3; }
  #err {
    background: #fff; border: 2px solid #f0d5cd; border-radius: 20px; padding: 32px 26px;
    text-align: center; max-width: 440px; margin-top: 20px;
  }
  #err h2 { font-size: 19px; margin-bottom: 8px; }
  #err p { font-size: 14px; color: #8a90a3; line-height: 1.6; }
  footer { margin-top: auto; padding-top: 26px; font-size: 12px; color: #b6bac9; }
  [hidden] { display: none; }
</style>
</head>
<body>
  <div class="badge">📡 실시간 팀 투표</div>
  <h1 id="q"></h1>
  <div class="sub" id="sub"></div>
  <div class="me" id="me" hidden></div>
  <div id="status"><span class="dot" id="dot"></span><span id="statusText">연결 중…</span></div>
  <div id="notice" hidden></div>

  <div id="list" hidden></div>
  <div id="submitWrap" hidden>
    <div id="picked"></div>
    <button id="submit" disabled>투표 제출</button>
  </div>

  <div id="done" hidden>
    <div class="big">🗳️</div>
    <p><b id="doneName"></b>님의 투표가 제출되었습니다!</p>
    <div class="picks" id="donePicks"></div>
    <p class="muted">마감 전까지는 수정할 수 있어요.</p>
    <div class="doneBtns">
      <a id="goBoard" href="board.html">📊 실시간 결과 보기</a>
      <button id="edit">선택 수정하기</button>
    </div>
  </div>

  <div id="err" hidden>
    <h2>개인 QR로 접속해주세요</h2>
    <p>이 투표는 나눠드린 개인 QR 코드로만 참여할 수 있습니다.<br>
    본인 이름이 적힌 QR을 카메라로 찍어 다시 접속해주세요.</p>
  </div>

  <footer>QR 실시간 투표</footer>

<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<script src="config.js"></script>
<script>
  var params = new URLSearchParams(location.search);
  var token = params.get("t") || "";

  var teamByKey = {};
  POLL.teams.forEach(function (t) { teamByKey[t.key] = t; });

  document.getElementById("q").textContent = POLL.title;
  document.getElementById("sub").textContent = POLL.subtitle;

  function showErr() {
    document.getElementById("err").hidden = false;
    document.getElementById("status").hidden = true;
  }

  if (!token) {
    showErr();
  } else {
    sha16(token).then(function (h) {
      var voter = null;
      POLL.voters.forEach(function (v) { if (v.h === h) voter = v; });
      if (!voter) showErr();
      else initVote(voter, h);
    });
  }

  function initVote(voter, myHash) {
    var myTopic = POLL.id + "/ballot/" + myHash;
    var picks = [];            // 선택한 팀 key 목록
    var submitted = null;      // 마지막으로 제출된 팀 key 목록
    var interacted = false;    // 사용자가 화면을 만지기 시작했는지
    var lastTs = 0;            // 지금까지 반영한 메시지 중 가장 최신 시각
    var links = [];            // 브로커 연결 목록

    var meEl = document.getElementById("me");
    meEl.hidden = false;
    meEl.textContent = voter.name + " (" + teamByKey[voter.team].name + ")";

    var list = document.getElementById("list");
    var submitWrap = document.getElementById("submitWrap");
    var submitBtn = document.getElementById("submit");
    var pickedEl = document.getElementById("picked");
    var noticeEl = document.getElementById("notice");
    list.hidden = false;
    submitWrap.hidden = false;

    var teamBtns = {};
    POLL.teams.forEach(function (t) {
      var b = document.createElement("button");
      b.className = "team";
      var e = document.createElement("span");
      e.className = "e";
      e.textContent = t.emoji;
      var n = document.createElement("span");
      n.textContent = t.name;
      b.appendChild(e);
      b.appendChild(n);
      if (t.key === voter.team) {
        b.classList.add("mine");
        b.disabled = true;
        var tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = "우리 팀 · 투표 불가";
        b.appendChild(tag);
      } else {
        var mark = document.createElement("span");
        mark.className = "mark";
        b.appendChild(mark);
        b.addEventListener("click", function () { toggle(t.key); });
      }
      list.appendChild(b);
      teamBtns[t.key] = b;
    });

    function anyUp() { return links.some(function (x) { return x.up; }); }

    function toggle(key) {
      interacted = true;
      var i = picks.indexOf(key);
      if (i >= 0) picks.splice(i, 1);
      else if (picks.length < POLL.maxPicks) picks.push(key);
      refresh();
    }

    function refresh() {
      POLL.teams.forEach(function (t) {
        if (t.key === voter.team) return;
        var b = teamBtns[t.key];
        var sel = picks.indexOf(t.key) >= 0;
        b.classList.toggle("sel", sel);
        b.querySelector(".mark").textContent = sel ? "✓" : "";
      });
      pickedEl.textContent = picks.length + " / " + POLL.maxPicks + "팀 선택됨";
      submitBtn.disabled = !(anyUp() && picks.length === POLL.maxPicks);
    }
    refresh();

    function setStatus(text, on) {
      document.getElementById("statusText").textContent = text;
      document.getElementById("dot").className = on ? "dot on" : "dot";
    }
    function updateStatus() {
      if (anyUp()) setStatus("실시간 연결됨", true);
      else setStatus("연결 중…", false);
      refresh();
    }

    // ----- 연결: 두 브로커 모두에 접속 (표를 양쪽에 저장해 유실 방지) -----
    POLL.brokers.forEach(function (url) {
      var entry = { up: false, client: null };
      links.push(entry);
      var c = mqtt.connect(url, {
        clientId: "qv_" + Math.random().toString(16).slice(2, 10),
        connectTimeout: 8000,
        reconnectPeriod: 5000,
        clean: true,
      });
      entry.client = c;
      c.on("connect", function () {
        entry.up = true;
        c.subscribe(myTopic, { qos: 1 });   // 내 표(보존 메시지) 복원/초기화 감지용
        updateStatus();
      });
      c.on("close", function () {
        if (entry.up) { entry.up = false; updateStatus(); }
      });
      c.on("error", function () { /* 재연결은 mqtt.js가 알아서 반복 */ });
      c.on("message", onMsg);
    });

    function onMsg(t, payload) {
      if (!payload || payload.length === 0) return;   // 빈 메시지는 무시
      var m;
      try { m = JSON.parse(payload.toString()); } catch (e) { return; }
      if (!m || !validTs(m.ts)) return;

      if (m.reset === true && typeof m.a === "string") {
        // 관리자 초기화 묘비 메시지 — 진짜인지 해시로 확인
        sha16(m.a).then(function (ah) {
          if (ah !== POLL.adminHash) return;
          if (m.ts <= lastTs) return;
          lastTs = m.ts;
          handleReset();
        });
        return;
      }

      // 내 보존 표 — 토큰 증명과 내용 검증 후 복원 (다른 기기에서 투표한 경우 포함)
      if (m.token !== token) return;
      if (!validTeams(m.teams, voter.team)) return;
      if (m.ts <= lastTs) return;
      lastTs = m.ts;
      if (!interacted || submitted) {
        picks = m.teams.slice();
        showDone(m.teams);
        refresh();
      }
    }

    function handleReset() {
      submitted = null;
      picks = [];
      interacted = false;
      document.getElementById("done").hidden = true;
      list.hidden = false;
      submitWrap.hidden = false;
      noticeEl.hidden = false;
      noticeEl.textContent = "투표가 초기화되었습니다 — 다시 선택해주세요";
      refresh();
    }

    submitBtn.addEventListener("click", function () {
      if (!anyUp() || picks.length !== POLL.maxPicks) return;
      submitBtn.disabled = true;
      setStatus("전송 중…", false);
      var chosen = picks.slice();
      var ts = Date.now();
      var payload = JSON.stringify({ token: token, teams: chosen, ts: ts });
      var settled = false;
      var timer = setTimeout(function () {
        if (settled) return;
        settled = true;
        setStatus("전송 실패 — 다시 눌러주세요", false);
        refresh();
      }, 6000);
      // retain: 브로커가 사람별 마지막 표를 저장 → 결과판을 언제 열어도 복원됨
      links.forEach(function (entry) {
        entry.client.publish(myTopic, payload, { qos: 1, retain: true }, function (err) {
          if (settled || err) return;
          settled = true;                    // 한 브로커라도 저장되면 성공
          clearTimeout(timer);
          if (ts > lastTs) lastTs = ts;
          noticeEl.hidden = true;
          updateStatus();
          showDone(chosen);
        });
      });
    });

    function showDone(teams) {
      submitted = teams.slice();
      list.hidden = true;
      submitWrap.hidden = true;
      var done = document.getElementById("done");
      done.hidden = false;
      document.getElementById("doneName").textContent = voter.name;
      document.getElementById("donePicks").textContent = teams.map(function (k) {
        return teamByKey[k].emoji + " " + teamByKey[k].name;
      }).join(" · ");
    }

    document.getElementById("edit").addEventListener("click", function () {
      interacted = true;
      document.getElementById("done").hidden = true;
      list.hidden = false;
      submitWrap.hidden = false;
      refresh();
    });
  }
</script>
</body>
</html>
