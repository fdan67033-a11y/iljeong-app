<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>공모 관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Segoe UI", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    background: #f4f5fa; color: #1f2330;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px;
  }
  .badge {
    font-size: 13px; font-weight: 600; color: #b3401f; background: #fbe9e2;
    border-radius: 999px; padding: 5px 14px;
  }
  h1 { font-size: 22px; margin: 14px 0 6px; }
  #status { font-size: 13px; color: #8a90a3; margin-bottom: 20px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #f0b429; flex-shrink: 0; }
  .dot.on { background: #22c55e; }
  .card {
    background: #fff; border: 2px solid #e4e6ef; border-radius: 18px;
    padding: 24px; width: 100%; max-width: 480px; margin-bottom: 16px;
  }
  .phaseNow { font-size: 15px; margin-bottom: 4px; color: #8a90a3; }
  .phaseNow b { font-size: 22px; color: #1f2330; display: block; margin-top: 4px; }
  .stats { font-size: 15px; color: #1f2330; line-height: 2; }
  .stats .num { font-weight: 700; color: #4f46e5; }
  .miss { font-size: 13px; color: #8a90a3; margin-top: 8px; line-height: 1.7; }
  h2 { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
  button.primary {
    width: 100%; background: #4f46e5; color: #fff; border: none; border-radius: 12px;
    padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  button.primary:disabled { background: #c7c5f4; cursor: default; }
  .msg { font-size: 13px; margin-top: 10px; line-height: 1.6; }
  .msg.err { color: #b3401f; }
  .msg.ok { color: #16a34a; }
  .who { font-size: 13px; color: #16a34a; margin-bottom: 14px; }
  .phaseBtns { display: flex; flex-direction: column; gap: 10px; }
  .phaseBtns button {
    border: 2px solid #e4e6ef; background: #fff; border-radius: 14px; padding: 15px 16px;
    font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; text-align: left;
    display: flex; align-items: center; gap: 10px;
  }
  .phaseBtns button:hover:not(:disabled) { border-color: #4f46e5; }
  .phaseBtns button.now { border-color: #22c55e; background: #ecfdf3; }
  .phaseBtns button:disabled { opacity: .5; cursor: default; }
  .phaseBtns button .desc { font-size: 12px; color: #8a90a3; font-weight: 400; display: block; margin-top: 3px; }
  .phaseBtns button .cur { margin-left: auto; font-size: 11px; color: #16a34a; font-weight: 700; }
  .logout { margin-top: 14px; background: none; border: 1px solid #d4d7e3; color: #8a90a3; border-radius: 10px; padding: 9px 16px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .note { font-size: 12px; color: #8a90a3; line-height: 1.7; }
  .note code { font-family: Consolas, monospace; background: #f4f5fa; padding: 1px 5px; border-radius: 5px; }
  .boardLink { display: inline-block; margin-top: 4px; border-radius: 10px; padding: 10px 16px; font-size: 14px; text-decoration: none; background: #4f46e5; color: #fff; font-weight: 600; }
  [hidden] { display: none; }
</style>
</head>
<body>
  <div class="badge">🔧 관리자</div>
  <h1 id="q"></h1>
  <div id="status"><span class="dot" id="dot"></span><span id="statusText">연결 중…</span></div>

  <div class="card">
    <div class="phaseNow">현재 단계 <b id="phaseNow">불러오는 중…</b></div>
  </div>

  <div class="card">
    <div class="stats" id="stats">현황 불러오는 중…</div>
    <div class="miss" id="miss"></div>
  </div>

  <div class="card">
    <h2>단계 전환</h2>

    <div id="loginBox">
      <button class="primary" id="googleBtn">Google로 로그인</button>
      <div class="msg" id="loginMsg" style="margin-top:12px">Firebase 프로젝트를 만든 구글 계정으로 로그인하세요.</div>
    </div>

    <div id="controlBox" hidden>
      <div class="who" id="who"></div>
      <div class="phaseBtns">
        <button data-phase="collect">📝 슬로건 접수<span class="desc">문구 제출·갤러리 열람</span><span class="cur" hidden>현재</span></button>
        <button data-phase="vote">🗳️ 투표 개시<span class="desc">자기 팀 제외 1인 2표</span><span class="cur" hidden>현재</span></button>
        <button data-phase="closed">🏁 투표 마감<span class="desc">최다득표 문구 확정</span><span class="cur" hidden>현재</span></button>
      </div>
      <div class="msg" id="ctrlMsg"></div>
      <button class="logout" id="logoutBtn">로그아웃</button>
    </div>
  </div>

  <div class="card">
    <div class="note">
      · 부적절한 문구 삭제: 콘솔에서 <code>polls/slogan-2026/sloganList/해당항목</code> 삭제<br>
      · 특정인 재투표 허용: 콘솔에서 <code>polls/slogan-2026/ballots/그사람해시</code> 삭제<br>
      · 전체 표 초기화: 콘솔에서 <code>polls/slogan-2026/ballots</code> 삭제
    </div>
    <div style="margin-top:14px"><a class="boardLink" href="board.html" target="_blank">📊 결과 현황판 열기</a></div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="config.js"></script>
<script>
  document.getElementById("q").textContent = POLL.title + " 관리";

  firebase.initializeApp(POLL.firebase);
  var db = firebase.database();
  var auth = firebase.auth();
  var base = "polls/" + POLL.id;

  var LABEL = { collect: "📝 슬로건 접수 중", vote: "🗳️ 투표 진행 중", closed: "🏁 투표 마감" };
  var curPhase = null;

  function setStatus(text, on) {
    document.getElementById("statusText").textContent = text;
    document.getElementById("dot").className = on ? "dot on" : "dot";
  }

  db.ref(".info/connected").on("value", function (snap) {
    setStatus(snap.val() === true ? "실시간 연결됨" : "연결 중…", snap.val() === true);
  });

  // ----- 공개 데이터 (로그인 불필요) -----
  db.ref(base + "/state/phase").on("value", function (snap) {
    curPhase = snap.val();
    document.getElementById("phaseNow").textContent =
      curPhase ? (LABEL[curPhase] || String(curPhase)) : "미설정";
    highlightPhase();
  }, function () {
    setStatus("읽기 권한 오류 — 보안 규칙 게시 여부 확인", false);
  });

  var sloganCnt = 0, ballotCnt = 0, missing = [];
  function renderStats() {
    document.getElementById("stats").innerHTML =
      "접수된 문구 <span class='num'>" + sloganCnt + "</span>건<br>" +
      "투표 제출 <span class='num'>" + ballotCnt + "</span> / " + POLL.voters.length + "명";
    document.getElementById("miss").textContent =
      (missing.length && missing.length < POLL.voters.length)
        ? "미제출: " + missing.map(function (v) { return v.name; }).join(", ")
        : (missing.length === 0 ? "🎉 전원 제출 완료" : "");
  }
  db.ref(base + "/sloganList").on("value", function (snap) {
    sloganCnt = snap.numChildren(); renderStats();
  }, function () { setStatus("읽기 권한 오류 — 보안 규칙 게시 여부 확인", false); });
  var ballotSet = {};
  POLL.voters.forEach(function (v) {
    db.ref(base + "/ballots/" + v.h + "/vote").on("value", function (snap) {
      ballotSet[v.h] = snap.val() ? true : false;
      ballotCnt = POLL.voters.filter(function (x) { return ballotSet[x.h]; }).length;
      missing = POLL.voters.filter(function (x) { return !ballotSet[x.h]; });
      renderStats();
    }, function () {});
  });

  // ----- Google 로그인 -----
  var loginMsg = document.getElementById("loginMsg");
  document.getElementById("googleBtn").addEventListener("click", function () {
    loginMsg.className = "msg"; loginMsg.textContent = "구글 로그인 창을 여는 중…";
    var provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(function (err) {
      loginMsg.className = "msg err";
      var c = err && err.code;
      if (c === "auth/operation-not-allowed" || c === "auth/configuration-not-found")
        loginMsg.textContent = "콘솔 → Authentication → 로그인 방법에서 'Google'을 먼저 켜주세요.";
      else if (c === "auth/unauthorized-domain")
        loginMsg.textContent = "콘솔 → Authentication → 설정 → 승인된 도메인에 이 사이트 도메인을 추가하세요.";
      else if (c === "auth/popup-blocked")
        loginMsg.textContent = "팝업이 차단되었습니다. 팝업을 허용한 뒤 다시 눌러주세요.";
      else if (c === "auth/popup-closed-by-user" || c === "auth/cancelled-popup-request")
        loginMsg.textContent = "로그인이 취소되었습니다.";
      else loginMsg.textContent = "로그인 실패: " + (c || err);
    });
  });
  document.getElementById("logoutBtn").addEventListener("click", function () { auth.signOut(); });

  // ----- 로그인 상태 -----
  var ctrlMsg = document.getElementById("ctrlMsg");
  function showControl(who, authorized) {
    document.getElementById("loginBox").hidden = true;
    document.getElementById("controlBox").hidden = false;
    document.getElementById("who").textContent = who;
    Array.prototype.forEach.call(document.querySelectorAll(".phaseBtns button"), function (b) { b.disabled = !authorized; });
  }
  auth.onAuthStateChanged(function (user) {
    if (!user) {
      document.getElementById("loginBox").hidden = false;
      document.getElementById("controlBox").hidden = true;
      loginMsg.className = "msg"; loginMsg.textContent = "Firebase 프로젝트를 만든 구글 계정으로 로그인하세요.";
      return;
    }
    db.ref(base + "/admin/uid").once("value").then(function (snap) {
      var uid = snap.val();
      if (!uid) {
        return db.ref(base + "/admin/uid").set(user.uid).then(function () { return user.uid; });
      }
      return uid;
    }).then(function (adminUid) {
      if (adminUid === user.uid) {
        showControl("✓ 관리자로 로그인됨 (" + user.email + ")", true);
        ctrlMsg.textContent = "";
        highlightPhase();
      } else {
        showControl("로그인됨: " + user.email, false);
        ctrlMsg.className = "msg err";
        ctrlMsg.textContent = "이 계정은 관리자가 아닙니다 (다른 계정이 이미 등록됨).";
      }
    }).catch(function (err) {
      if (String(err).indexOf("PERMISSION_DENIED") >= 0) {
        showControl("로그인됨: " + user.email, false);
        ctrlMsg.className = "msg err";
        ctrlMsg.textContent = "이 구글 계정(" + user.email + ")은 관리자로 지정되어 있지 않습니다. " +
          "config.js의 adminEmail과 DB의 admin/email을 이 주소로 맞춰주세요.";
      } else {
        ctrlMsg.className = "msg err";
        ctrlMsg.textContent = "관리자 등록 확인 실패: " + (err && err.code || err);
      }
    });
  });

  function highlightPhase() {
    Array.prototype.forEach.call(document.querySelectorAll(".phaseBtns button"), function (b) {
      var isNow = b.getAttribute("data-phase") === curPhase;
      b.classList.toggle("now", isNow);
      b.querySelector(".cur").hidden = !isNow;
    });
  }

  // ----- 단계 전환 버튼 -----
  Array.prototype.forEach.call(document.querySelectorAll(".phaseBtns button"), function (btn) {
    btn.addEventListener("click", function () {
      if (btn.disabled) return;
      var next = btn.getAttribute("data-phase");
      if (next === curPhase) { ctrlMsg.className = "msg"; ctrlMsg.textContent = "이미 이 단계입니다."; return; }
      var label = { collect: "슬로건 접수", vote: "투표 개시", closed: "투표 마감" }[next];
      if (!confirm("단계를 '" + label + "'(으)로 변경할까요?\n모든 참가자·현황판에 즉시 반영됩니다.")) return;
      ctrlMsg.className = "msg"; ctrlMsg.textContent = "변경 중…";
      db.ref(base + "/state/phase").set(next).then(function () {
        ctrlMsg.className = "msg ok"; ctrlMsg.textContent = "✓ '" + label + "'으로 변경되었습니다.";
      }).catch(function (err) {
        ctrlMsg.className = "msg err";
        if (String(err).indexOf("PERMISSION_DENIED") >= 0)
          ctrlMsg.textContent = "권한 거부 — 관리자 등록/규칙을 확인하세요.";
        else ctrlMsg.textContent = "변경 실패: " + (err && err.code || err);
      });
    });
  });
</script>
</body>
</html>
